server {
    listen 80;
    server_name gustopro.it www.gustopro.it;
    root /usr/share/nginx/html;
    index index.html;

    # === SECURITY HEADERS ===

    # CSP: blocca XSS, permette solo risorse autorizzate
    add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' https://images.unsplash.com https://api.qrserver.com data:; connect-src 'self'; frame-ancestors 'none'; base-uri 'self'; form-action 'self';" always;

    # HSTS: forza HTTPS per 1 anno
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # Clickjacking: impedisce embedding in iframe
    add_header X-Frame-Options "DENY" always;

    # MIME sniffing: impedisce al browser di indovinare il Content-Type
    add_header X-Content-Type-Options "nosniff" always;

    # Referrer: non invia URL completo a siti esterni
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Permissions: disabilita API non necessarie
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), payment=()" always;

    # SPA fallback
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache assets
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml;
}
